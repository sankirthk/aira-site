<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Primary SEO -->
    <title>Aira — Mac Teleprompter for Presenters and Creators</title>
    <meta
      name="description"
      content="Aira is a free macOS teleprompter that keeps your script near the camera. Hidden from Zoom and screen recordings. Voice-activated scrolling. No account required. macOS 14.4+."
    />
<link rel="canonical" href="https://useaira.co/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aira" />
    <meta property="og:url" content="https://useaira.co/" />
    <meta property="og:title" content="Aira — Mac Teleprompter for Presenters and Creators" />
    <meta property="og:description" content="A free macOS teleprompter that keeps your script near the camera. Hidden from Zoom and screen recordings. Voice-activated scrolling. No account required." />
    <meta property="og:image" content="https://useaira.co/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aira — Mac Teleprompter for Presenters and Creators" />
    <meta name="twitter:description" content="A free macOS teleprompter that keeps your script near the camera. Hidden from Zoom and screen recordings. Voice-activated scrolling. No account required." />
    <meta name="twitter:image" content="https://useaira.co/og-image.png" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Aira",
      "url": "https://useaira.co",
      "description": "A native macOS teleprompter that displays your script in a floating overlay near the camera. Hidden from screen sharing and Zoom recordings. Voice-activated scrolling, no account or sign-up required.",
      "operatingSystem": "macOS 14.4+",
      "applicationCategory": "UtilitiesApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Notch overlay sits near the camera for natural eye contact",
        "Hidden from Zoom, Google Meet, Teams, and screen recordings",
        "Voice-activated scrolling using on-device speech recognition",
        "Floating pill windows for any display",
        "Import scripts from PDF, DOCX, TXT, and Markdown",
        "No account, no telemetry, local-only storage",
        "Free download"
      ],
      "author": {
        "@type": "Organization",
        "name": "Aira",
        "url": "https://useaira.co"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Indie+Flower&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
